[project]
name = "visionsuite-core"
version = "0.0.0"
requires-python = ">=3.11"
dependencies = ["pillow>=10", "datasets>=3", "imageio>=2.34", "imageio-ffmpeg>=0.5"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["visionsuite_core"]
